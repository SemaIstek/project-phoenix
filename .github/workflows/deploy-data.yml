name: Deploy CSV to Azure Storage

on:
  push:
    branches: [ main ]
    paths:
      - 'csv/**'
  workflow_dispatch:

jobs:
  deploy-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: List files (Debug)
      run: |
        echo "📂 Repository contents:"
        ls -la
        echo "📂 CSV folder contents:"
        ls -la csv/
        echo "📂 CSV file check:"
        ls -la csv/filtered_data_complete.csv
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Upload CSV to Azure Blob Storage
      run: |
        az storage blob upload \
          --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
          --container-name ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }} \
          --name filtered_data_complete.csv \
          --file csv/filtered_data_complete.csv \
          --auth-mode login \
          --overwrite
    
    - name: Verify Upload
      run: |
        echo "✅ CSV uploaded successfully!"
        az storage blob list \
          --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
          --container-name ${{ secrets.AZURE_STORAGE_CONTAINER_NAME }} \
          --auth-mode login \
          --output table